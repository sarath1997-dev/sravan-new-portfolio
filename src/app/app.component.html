<div
  class="min-h-screen transition-colors duration-300 bg-light-bg text-dark-text dark:bg-dark-bg dark:text-light-text aurora-background"
>
  <!-- Falling Shapes Background -->
  <div
    class="fixed top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none"
  >
    @for (shape of shapes(); track $index) {
      <div
        class="falling-shape pointer-events-auto"
        [style.left]="shape.left"
        [style.width]="shape.size"
        [style.height]="shape.size"
        [style.animation-duration]="shape.animationDuration"
        [style.animation-delay]="shape.animationDelay"
        [style.background-color]="shape.color"
        [style.box-shadow]="
          '0 0 15px ' + shape.color + ', 0 0 30px ' + shape.color
        "
      ></div>
    }
  </div>

  <!-- Main Content Wrapper -->
  <div class="relative z-10">
    <app-header
      [isDarkMode]="isDarkMode()"
      (themeToggle)="toggleTheme()"
    ></app-header>
    <main class="overflow-x-hidden">
      <app-hero [isDarkMode]="isDarkMode()"></app-hero>
      <app-selected-work></app-selected-work>
      <app-bento-grid></app-bento-grid>
      <app-services></app-services>
      <app-contact></app-contact>
    </main>
    <app-footer></app-footer>
    <app-floating-cta></app-floating-cta>
  </div>
</div>
