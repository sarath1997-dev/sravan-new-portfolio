<header
  class="fixed top-0 left-0 right-0 z-50 bg-light-surface/80 dark:bg-dark-bg/50 backdrop-blur-lg border-b border-light-border dark:border-glass-border transition-all duration-300"
>
  <div class="container mx-auto px-6 py-4 flex justify-between items-center">
    <button
      (click)="scrollToSection('top')"
      class="text-xl font-black tracking-wider uppercase text-dark-text dark:text-light-text"
    >
      SK.
    </button>

    <div class="flex items-center gap-2">
      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center gap-6">
        @for (link of navLinks; track link.path) {
          <button
            (click)="scrollToSection(link.path)"
            class="text-sm font-semibold text-medium-text hover:text-dark-text dark:text-dim-text dark:hover:text-light-text transition-colors"
          >
            {{ link.label }}
          </button>
        }
      </nav>

      <!-- <div
        class="w-px h-6 bg-light-border dark:bg-glass-border hidden md:block mx-4"
      ></div> -->

      <!-- Mobile Menu Button -->
      <button
        (click)="toggleMenu()"
        class="md:hidden w-10 h-10 flex items-center justify-center text-dark-text dark:text-light-text z-50"
        aria-label="Toggle menu"
      >
        @if (!isMenuOpen()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  @if (isMenuOpen()) {
    <div
      class="fixed inset-0 top-24 z-40 md:hidden flex flex-col items-center justify-center animate-fade-in bg-white/10 dark:bg-black/20 backdrop-blur-2xl border-t border-white/20 dark:border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.25)]"
    >
      <!-- Optional Soft Gradient Layer -->
      <div
        class="absolute inset-0 bg-gradient-to-b from-white/20 via-transparent to-white/10 dark:from-white/10 dark:to-transparent pointer-events-none"
      ></div>

      <nav class="relative flex flex-col items-center gap-8 bg-black/50 w-full">
        @for (link of navLinks; track link.path) {
          <button
            (click)="scrollToSection(link.path)"
            class="text-2xl font-bold text-dark-text dark:text-light-text transition-all duration-300 hover:scale-105 hover:opacity-80"
          >
            {{ link.label }}
          </button>
        }
      </nav>
    </div>
  }
</header>
