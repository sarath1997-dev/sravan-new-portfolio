<section
  id="work"
  class="py-20 overflow-hidden bg-white dark:bg-dark-bg transition-colors"
>
  <div class="container mx-auto px-6">
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold mb-4">Selected Work</h2>
      <p class="text-dim-text">Hover to preview</p>
    </div>

    <div class="flex flex-row overflow-x-auto gap-6 pb-12 px-[5%] no-scrollbar">
      @for (project of projects; track project.videoUrl) {
        <div
          class="project-card flex-none w-[15rem] md:w-[20rem] h-[25rem] md:h-[30rem]"
          [class.is-active]="activeProjectUrl === project.videoUrl"
        >
          <div
            class="relative h-[85%] w-full rounded-3xl overflow-hidden border-2 border-transparent transition-all duration-500 shadow-xl bg-black"
            (mouseenter)="setHover(project.videoUrl, true)"
            (mouseleave)="setHover(project.videoUrl, false)"
          >
            <!-- VIDEO -->
            <video
              #videoPlayer
              loop
              muted
              playsinline
              [poster]="project.poster"
              [attr.data-id]="project.videoUrl"
              class="w-full h-full object-cover"
              (play)="setPlaying(project.videoUrl, true)"
              (pause)="setPlaying(project.videoUrl, false)"
              (ended)="setPlaying(project.videoUrl, false)"
              (click)="toggleVideo(project.videoUrl, videoPlayer)"
            >
              <source [src]="project.videoUrl" type="video/mp4" />
            </video>

            <!-- GLASS PLAY / PAUSE BUTTON -->
            <button
              (click)="
                toggleVideo(project.videoUrl, videoPlayer);
                $event.stopPropagation()
              "
              class="absolute inset-0 flex items-center justify-center transition-opacity duration-300"
              [class.opacity-0]="
                isPlayingMap[project.videoUrl] &&
                !isHoveringMap[project.videoUrl]
              "
              [class.opacity-100]="
                !isPlayingMap[project.videoUrl] ||
                isHoveringMap[project.videoUrl]
              "
            >
              <div
                class="w-16 h-16 flex items-center justify-center rounded-full bg-white/20 backdrop-blur-xl border border-white/30 shadow-2xl transition-all duration-200 hover:scale-110 active:scale-90"
              >
                <!-- Play -->
                @if (!isPlayingMap[project.videoUrl]) {
                  <svg
                    class="w-8 h-8 text-white"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path d="M8 5v14l11-7z" />
                  </svg>
                }

                <!-- Pause -->
                @if (isPlayingMap[project.videoUrl]) {
                  <svg
                    class="w-8 h-8 text-white"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                  </svg>
                }
              </div>
            </button>
          </div>
        </div>
      }
    </div>
